risk:
  min_liquidity_sol: 10.0
  max_top10_holder_pct: 50.0
  max_creator_holding_pct: 10.0
  min_age_minutes: 5
  min_unique_buyers: 20
  require_mint_authority_revoked: true
  require_freeze_authority_revoked: true

position:
  max_single_position_sol: 0.5
  max_portfolio_sol: 5.0
  max_open_positions: 5
  default_slippage_bps: 300
  max_slippage_bps: 500

exits:
  tp_levels:
    - { multiple: 2.0,  sell_pct: 0.25 }
    - { multiple: 5.0,  sell_pct: 0.25 }
    - { multiple: 10.0, sell_pct: 0.25 }
    - { multiple: 20.0, sell_pct: 0.25 }
  stop_loss_pct: 0.50
  time_stop_minutes: 120
  trail_stop_pct: 0.30
  dynamic_exits_enabled: false
  dynamic_volume_decay_ratio: 0.20
  dynamic_volume_decay_minutes: 15
  dynamic_liquidity_drop_ratio: 0.50
  dynamic_liquidity_drop_window_seconds: 60
  dynamic_trail_start_multiple: null

execution:
  mode: paper
  rpc_provider: helius
  primary_rpc_url: null
  backup_rpc_url: null
  priority_fee_lamports: 10000
  min_priority_fee_lamports: 0
  max_priority_fee_lamports: 100000
  jito_tip_lamports: 0
  max_jito_tip_lamports: 100000
  tx_retry_count: 3
  tx_confirm_timeout_s: 30

live_guardrails:
  confirmation_phrase: I_UNDERSTAND_THIS_CAN_LOSE_REAL_SOL
  max_trade_sol: 0.01
  max_daily_trades: 3
  max_daily_loss_sol: 0.05
  min_wallet_balance_sol: 0.05

monitoring:
  heartbeat_interval_s: 60
  log_level: INFO
